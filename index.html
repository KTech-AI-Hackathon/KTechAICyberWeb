<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTech AI - Cyber Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Rajdhani', sans-serif; 
      background: #0a0a0f; 
      color: #e0e0e0; 
      overflow-x: hidden;
    }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0f; display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .loader-text {
      font-family: 'Orbitron', monospace; font-size: 1.5rem;
      color: #00f0ff; text-transform: uppercase; letter-spacing: 0.5em;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; text-shadow: 0 0 20px #00f0ff; }
    }
    .grid-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none; z-index: -1;
    }
    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 9998;
    }
  </style>
</head>
<body>
  <div id="loading"><div class="loader-text">Initializing...</div></div>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
